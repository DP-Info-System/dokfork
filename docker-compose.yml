services:
  dokploy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dokploy
    restart: always
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - DATABASE_URL=postgres://dokploy:dokploypassword@localhost:5432/dokploy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: dokploy-db
    restart: always
    network_mode: host
    environment:
      - POSTGRES_USER=dokploy
      - POSTGRES_PASSWORD=dokploypassword
      - POSTGRES_DB=dokploy
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dokploy"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dokploy-redis
    restart: always
    network_mode: host
    volumes:
      - ./redis:/data
